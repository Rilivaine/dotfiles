# INPUT https://wiki.hyprland.org/Configuring/Variables/

input {
    kb_layout = us,ua
    kb_options=compose:ralt
    follow_mouse = 2

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0.3
    force_no_accel = false
    accel_profile = "flat" #flat
    numlock_by_default = true
}

# https://wiki.hyprland.org/Configuring/Keywords/#executing

device {
    name = beken-2.4g-wireless-device-1
    sensitivity = -0.7
}

device {
    name = beken-2.4g-wireless-device
    sensitivity = -0.7
}

device {
    name = beken-usb-gaming-mouse-2
    sensitivity = -0.7
}

device {
    name = beken-usb-gaming-mouse-1
    sensitivity = -0.7
  }

